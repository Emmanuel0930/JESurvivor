upstream django_web {
    server django:8000;
}

upstream flask_reservas {
    server flask_reservas:5000;
}

server {
    listen 80;

    # ──────────────────────────────────────────────
    # Microservicio Flask — Rutas estranguladas v2
    # Patrón Estrangulador: el tráfico de reservas
    # ya NO va al monolito Django sino al microservicio.
    # ──────────────────────────────────────────────
    location /api/v2/reservas/ {
        proxy_pass         http://flask_reservas;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para operaciones de reserva
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ──────────────────────────────────────────────
    # Monolito Django — Todo lo demás (legacy /api/v1/)
    # ──────────────────────────────────────────────
    location / {
        proxy_pass         http://django_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
